name: Compile Native Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  gradle-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Generate Native Android Directory Structure
      run: node generate-native.js

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v4

    - name: Copy Gradle Wrapper Executables
      run: |
        cd android-native
        # Safe-fall back generation if binary wrappers aren't explicitly declared in repository text strings
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    - name: Build Native Debug APK
      run: |
        cd android-native
        ./gradlew assembleDebug

    - name: Upload Finished APK File
      uses: actions/upload-artifact@v4
      with:
        name: PanelFinder-IR-Blaster-APK
        path: android-native/app/build/outputs/apk/debug/app-debug.apk
